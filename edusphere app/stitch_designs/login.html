<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .tap-highlight-none {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col items-center justify-center selection:bg-primary-fixed-dim overflow-x-hidden">
<!-- Hero Image Area (Asymmetric Background Element) -->
<div class="fixed top-0 left-0 w-full h-[353px] -z-10 overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/20 to-secondary-container/10"></div>
<img class="w-full h-full object-cover opacity-30 mix-blend-overlay" data-alt="A modern university campus lobby with high glass ceilings and students collaborating in the background. The scene is bright and airy, flooded with soft morning light, following a clean light-mode aesthetic. The color palette is dominated by soft whites and corporate blues, reflecting a professional yet energetic educational environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsJmOTkejrN7Xk2a0mfk10_JAOFVEPDgvDAddEpN5VZgRnh1CzJfcA2MK5KSQ6lUYOXGUgCe0LeDtxvJVBL3GxnL09C8S3epKBs8gGTEbS1a6tzQaa0pUOOmyL1CC1PnFnaaOUgnZQEwHrtkegE2-L4VNSAYo2L0TFk8lA3f9KFLoHGpAg85HpQF7dkE8E641o1PGGllxax0p2F1Hf9EiMaRVw54FSMkQ3QbQqy_J4pLfpzQP7ByiMpJ6NzqgVbB21xwzp_0MC0IT6"/>
</div>
<!-- Login Container -->
<main class="w-full max-w-[420px] px-margin-mobile flex flex-col items-center">
<!-- Header Section -->
<div class="text-center mb-xl w-full">
<h1 class="font-display text-display text-on-surface mb-xs tracking-tight">EduSphere</h1>
<p class="font-h2 text-h2 text-on-surface-variant">Welcome Back!</p>
<p class="font-body-md text-body-md text-outline mt-xs">Sign in to access your dashboard</p>
</div>
<!-- Form Section -->
<div class="w-full bg-surface-container-lowest/80 glass-effect p-xl rounded-[32px] shadow-[0_8px_32px_rgba(37,99,235,0.08)] border border-white/40">
<form class="space-y-lg">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block px-xs">EMAIL OR ID</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full h-14 pl-[52px] pr-md bg-surface-container-low border-2 border-transparent rounded-xl font-body-md text-on-surface focus:border-primary focus:bg-white transition-all outline-none" placeholder="name@edusphere.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block">PASSWORD</label>
<a class="font-caption text-caption text-primary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full h-14 pl-[52px] pr-[52px] bg-surface-container-low border-2 border-transparent rounded-xl font-body-md text-on-surface focus:border-primary focus:bg-white transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors tap-highlight-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary font-callout text-callout rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-sm" type="submit">
                    Login
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<!-- Biometric Login -->
</div>
<!-- Footer -->
</main>
<!-- Background Decorative Elements -->
<div class="fixed bottom-[-10%] right-[-5%] w-[300px] h-[300px] bg-secondary-container/5 rounded-full blur-[100px] -z-10"></div>
<div class="fixed top-[20%] left-[-10%] w-[250px] h-[250px] bg-primary-container/5 rounded-full blur-[80px] -z-10"></div>
</body></html>
