<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-between selection:bg-primary-fixed">
<!-- Top Branding Section -->
<header class="w-full pt-12 pb-6 px-margin-mobile flex justify-center items-center">
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center text-white shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined text-2xl" data-icon="school">school</span>
</div>
<span class="font-display text-display text-primary tracking-tighter">EduSphere</span>
</div>
</header>
<!-- Main Selection Canvas -->
<main class="flex-1 w-full max-w-4xl px-margin-mobile flex flex-col justify-center">
<div class="mb-xl text-center md:text-left">
<h1 class="font-h1 text-h1 text-on-surface mb-2">Continue as</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Please select your account type to get started.</p>
</div>
<!-- Role Cards Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Student Card -->
<button class="group relative flex flex-col items-start p-lg bg-primary-container rounded-role-card text-left transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] shadow-[0_4px_20px_rgba(37,99,235,0.12)] overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10 transform translate-x-4 -translate-y-4 group-hover:translate-x-2 group-hover:-translate-y-2 transition-transform duration-500">
<span class="material-symbols-outlined text-[120px]" data-icon="person">person</span>
</div>
<div class="w-14 h-14 rounded-2xl bg-white/20 backdrop-blur-md flex items-center justify-center mb-xl shadow-sm">
<span class="material-symbols-outlined text-white text-3xl" data-icon="school">school</span>
</div>
<h2 class="font-h2 text-h2 text-white mb-sm">Student</h2>
<p class="font-body-md text-body-md text-blue-100/90 max-w-[200px]">Access your classes &amp; results</p>
<div class="mt-xl flex items-center gap-2 text-white/80 font-subhead text-subhead">
<span>Select account</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</div>
<!-- Active Border Indicator -->
<div class="absolute inset-0 border-2 border-transparent group-focus:border-white/40 rounded-role-card transition-colors"></div>
</button>
<!-- Teacher Card -->
<button class="group relative flex flex-col items-start p-lg bg-teacher-green rounded-role-card text-left transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] shadow-[0_4px_20px_rgba(16,185,129,0.12)] overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10 transform translate-x-4 -translate-y-4 group-hover:translate-x-2 group-hover:-translate-y-2 transition-transform duration-500">
<span class="material-symbols-outlined text-[120px]" data-icon="clinical_notes">clinical_notes</span>
</div>
<div class="w-14 h-14 rounded-2xl bg-white/20 backdrop-blur-md flex items-center justify-center mb-xl shadow-sm">
<span class="material-symbols-outlined text-white text-3xl" data-icon="supervisor_account">supervisor_account</span>
</div>
<h2 class="font-h2 text-h2 text-white mb-sm">Teacher</h2>
<p class="font-body-md text-body-md text-emerald-50/90 max-w-[200px]">Manage classes &amp; attendance</p>
<div class="mt-xl flex items-center gap-2 text-white/80 font-subhead text-subhead">
<span>Select account</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</div>
<div class="absolute inset-0 border-2 border-transparent group-focus:border-white/40 rounded-role-card transition-colors"></div>
</button>
</div>
<!-- Illustration / Background Context -->
<div class="mt-xl hidden md:block opacity-40 grayscale pointer-events-none">

</button>

</p>
